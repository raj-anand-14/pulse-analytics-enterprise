<style>

/*=============================================================================
ROOT VARIABLES
=============================================================================*/

:root{

    /* Brand */

    --color-primary:#2563EB;
    --color-primary-dark:#1D4ED8;

    /* Background */

    --color-background:#0F172A;
    --color-surface:#1E293B;
    --color-surface-light:#334155;

    /* Text */

    --color-text:#F8FAFC;
    --color-text-muted:#94A3B8;

    /* Status */

    --color-success:#22C55E;
    --color-warning:#F59E0B;
    --color-danger:#EF4444;

    /* Border */

    --color-border:#334155;

    /* Radius */

    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:16px;
    --radius-xl:24px;

    /* Shadows */

    --shadow-sm:0 2px 6px rgba(0,0,0,.15);
    --shadow-md:0 8px 20px rgba(0,0,0,.25);
    --shadow-lg:0 18px 40px rgba(0,0,0,.35);

    /* Typography */

    --font-family:'Inter',sans-serif;

    --font-xs:.75rem;
    --font-sm:.875rem;
    --font-md:1rem;
    --font-lg:1.125rem;
    --font-xl:1.5rem;
    --font-2xl:2rem;
    --font-3xl:2.75rem;

    /* Font Weight */

    --fw-normal:400;
    --fw-medium:500;
    --fw-semibold:600;
    --fw-bold:700;

    /* Spacing */

    --space-1:4px;
    --space-2:8px;
    --space-3:12px;
    --space-4:16px;
    --space-5:20px;
    --space-6:24px;
    --space-8:32px;
    --space-10:40px;
    --space-12:48px;

    /* Layout */

    --header-height:72px;
    --footer-height:48px;
    --sidebar-width:260px;

    /* Animation */

    --transition-fast:.15s ease;
    --transition-normal:.25s ease;
    --transition-slow:.35s ease;

}

/*=============================================================================
RESET
=============================================================================*/

*,
*::before,
*::after{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    min-height:100vh;

    overflow:hidden;

    background:var(--color-background);

    color:var(--color-text);

    font-family:var(--font-family);

    font-size:var(--font-md);

    -webkit-font-smoothing:antialiased;

}

/*=============================================================================
TYPOGRAPHY
=============================================================================*/

h1{

    font-size:var(--font-3xl);
    font-weight:var(--fw-bold);

}

h2{

    font-size:var(--font-2xl);
    font-weight:var(--fw-semibold);

}

h3{

    font-size:var(--font-xl);
    font-weight:var(--fw-semibold);

}

h4{

    font-size:var(--font-lg);
    font-weight:var(--fw-semibold);

}

p{

    color:var(--color-text-muted);

    line-height:1.6;

}

/*=============================================================================
LINKS
=============================================================================*/

a{

    color:inherit;

    text-decoration:none;

}

/*=============================================================================
BUTTON RESET
=============================================================================*/

button{

    border:none;

    background:none;

    color:inherit;

    cursor:pointer;

    font:inherit;

}

/*=============================================================================
FORM RESET
=============================================================================*/

input,
textarea,
select{

    font:inherit;

    outline:none;

}

/*=============================================================================
LIST RESET
=============================================================================*/

ul,
ol{

    list-style:none;

}

/*=============================================================================
IMAGE RESET
=============================================================================*/

img{

    display:block;

    max-width:100%;

}

/*=============================================================================
SCROLLBAR
=============================================================================*/

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-track{

    background:var(--color-background);

}

::-webkit-scrollbar-thumb{

    background:var(--color-surface-light);

    border-radius:100px;

}

::-webkit-scrollbar-thumb:hover{

    background:var(--color-primary);

}

/*=============================================================================
SELECTION
=============================================================================*/

::selection{

    background:var(--color-primary);

    color:white;

}

</style>
