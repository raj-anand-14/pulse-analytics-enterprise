<style>

/*=============================================================================
APPLICATION SHELL
=============================================================================*/

.app{

    display:grid;

    grid-template-columns:
        var(--sidebar-width)
        1fr;

    grid-template-rows:
        var(--header-height)
        1fr
        var(--footer-height);

    grid-template-areas:

        "sidebar header"
        "sidebar main"
        "sidebar footer";

    width:100vw;

    height:100vh;

    overflow:hidden;

}

/*=============================================================================
SIDEBAR
=============================================================================*/

.app-sidebar{

    grid-area:sidebar;

    display:flex;

    flex-direction:column;

    background:var(--color-surface);

    border-right:1px solid var(--color-border);

    overflow-y:auto;

}

/*=============================================================================
HEADER
=============================================================================*/

.app-header{

    grid-area:header;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 var(--space-6);

    background:var(--color-surface);

    border-bottom:1px solid var(--color-border);

    position:sticky;

    top:0;

    z-index:100;

}

/*=============================================================================
MAIN
=============================================================================*/

.app-main{

    grid-area:main;

    overflow-y:auto;

    padding:var(--space-6);

    background:var(--color-background);

}

/*=============================================================================
FOOTER
=============================================================================*/

.app-footer{

    grid-area:footer;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 var(--space-6);

    background:var(--color-surface);

    border-top:1px solid var(--color-border);

    font-size:var(--font-sm);

}

/*=============================================================================
PAGE CONTAINER
=============================================================================*/

.page{

    width:100%;

    max-width:1600px;

    margin:0 auto;

}

/*=============================================================================
GRID UTILITIES
=============================================================================*/

.grid{

    display:grid;

    gap:var(--space-6);

}

.grid-2{

    grid-template-columns:repeat(2,1fr);

}

.grid-3{

    grid-template-columns:repeat(3,1fr);

}

.grid-4{

    grid-template-columns:repeat(4,1fr);

}

/*=============================================================================
FLEX UTILITIES
=============================================================================*/

.flex{

    display:flex;

}

.flex-column{

    flex-direction:column;

}

.align-center{

    align-items:center;

}

.justify-between{

    justify-content:space-between;

}

.justify-center{

    justify-content:center;

}

.gap-sm{

    gap:var(--space-2);

}

.gap-md{

    gap:var(--space-4);

}

.gap-lg{

    gap:var(--space-6);

}

/*=============================================================================
SPACING UTILITIES
=============================================================================*/

.mt-2{margin-top:var(--space-2);}
.mt-4{margin-top:var(--space-4);}
.mt-6{margin-top:var(--space-6);}

.mb-2{margin-bottom:var(--space-2);}
.mb-4{margin-bottom:var(--space-4);}
.mb-6{margin-bottom:var(--space-6);}

.p-4{padding:var(--space-4);}
.p-6{padding:var(--space-6);}

/*=============================================================================
RESPONSIVE
=============================================================================*/

@media screen and (max-width:1024px){

    .app{

        grid-template-columns:80px 1fr;

    }

}

@media screen and (max-width:768px){

    .app{

        grid-template-columns:1fr;

        grid-template-rows:

            var(--header-height)
            1fr
            var(--footer-height);

        grid-template-areas:

            "header"
            "main"
            "footer";

    }

    .app-sidebar{

        display:none;

    }

}

</style>
